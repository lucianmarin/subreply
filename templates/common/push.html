<div class="entry" id="push-status">
    <div class="status">
        Push notifications: <span id="push-state">checking</span>
        &mdash; <a href="#" id="push-toggle" onclick="togglePush(event)">Turn on</a>.
    </div>
</div>

<script>
    window.serverEndpoint = '{% if user.push_sub %}{{ user.push_sub.endpoint }}{% endif %}';
    window.addEventListener('load', function () {
        if ('serviceWorker' in navigator && 'PushManager' in window) {
            navigator.serviceWorker.ready.then(function (reg) {
                reg.pushManager.getSubscription().then(updatePushUI);
            });
        } else if (document.getElementById('push-toggle')) {
            document.getElementById('push-toggle').style.display = 'none';
        }
    });
</script>
