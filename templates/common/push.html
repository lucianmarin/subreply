<div class="entry" id="push-status">
    <div class="status">
        Push notifications: <span id="push-state">checking...</span>
        <span id="push-action"></span>
    </div>
</div>

<script type="text/javascript">
    var serverHasPush = {% if user.push_subscription %}true{% else %}false{% endif %};

    function clearServer() {
        fetch('/api/push/unsubscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        }).then(function () {
            serverHasPush = false;
            updatePushUI(null);
        });
    }

    function updatePushUI(sub) {
        var state = document.getElementById('push-state');
        var action = document.getElementById('push-action');
        if (sub) {
            state.innerText = 'on';
            action.innerHTML = '&mdash; <a href="#" onclick="togglePush(event)">Turn off</a>.';
        } else if (serverHasPush) {
            state.innerText = 'off';
            action.innerHTML = '&mdash; <a href="#" onclick="clearServer()">Clear old subscription</a> then <a href="#" onclick="togglePush(event)">Turn on</a>.';
        } else {
            state.innerText = 'off';
            action.innerHTML = '&mdash; <a href="#" onclick="togglePush(event)">Turn on</a>.';
        }
    }

    if ('serviceWorker' in navigator && 'PushManager' in window) {
        navigator.serviceWorker.ready.then(function (reg) {
            reg.pushManager.getSubscription().then(updatePushUI);
        });
    } else {
        document.getElementById('push-state').innerText = 'unsupported';
    }

    function togglePush(event) {
        event.preventDefault();
        if (!('serviceWorker' in navigator && 'PushManager' in window)) {
            return;
        }
        navigator.serviceWorker.ready.then(function (reg) {
            reg.pushManager.getSubscription().then(function (sub) {
                if (sub) {
                    sub.unsubscribe().then(function () {
                        fetch('/api/push/unsubscribe', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        serverHasPush = false;
                        updatePushUI(null);
                    });
                } else {
                    fetch('/api/vapid-key').then(function (r) { return r.json(); }).then(function (data) {
                        return reg.pushManager.subscribe({
                            userVisibleOnly: true,
                            applicationServerKey: urlBase64ToUint8Array(data.publicKey)
                        });
                    }).then(function (sub) {
                        return fetch('/api/push/subscribe', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                endpoint: sub.endpoint,
                                p256dh: btoa(String.fromCharCode.apply(null, new Uint8Array(sub.getKey('p256dh')))),
                                auth: btoa(String.fromCharCode.apply(null, new Uint8Array(sub.getKey('auth'))))
                            })
                        });
                    }).then(function () {
                        serverHasPush = true;
                        updatePushUI({});
                    });
                }
            });
        });
    }
</script>
